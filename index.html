<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f5f5f7" />
  <title>Apple 상담북</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar glass-card" id="sidebar">
      <div class="brand-row">
        <div class="brand-mark"><span class="apple-symbol">●</span><strong>Apple 상담북</strong></div>
        <span class="badge" id="modeBadge">내부 직원용</span>
      </div>

      <div class="search-wrap">
        <label class="search-box" for="searchInput">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10.5 18a7.5 7.5 0 1 1 5.303-12.803A7.5 7.5 0 0 1 10.5 18Zm0-13.2a5.7 5.7 0 1 0 0 11.4 5.7 5.7 0 0 0 0-11.4Zm8.7 14.4-3.1-3.1" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <input id="searchInput" type="search" autocomplete="off" placeholder="모델명·모델코드·색상·mm 검색" />
        </label>
        <div id="searchResults" class="search-results" hidden></div>
      </div>

      <section>
        <div class="section-head"><h2>카테고리</h2><small>Apple Watch 우선 구현</small></div>
        <div id="categoryGrid" class="category-grid"></div>
      </section>

      <section id="favoriteSection">
        <div class="section-head"><h2>자주 사용하는 비교</h2></div>
        <div id="favoriteList" class="favorites"></div>
      </section>

      <nav class="bottom-nav" aria-label="하단 메뉴">
        <button class="nav-item active" type="button" data-nav="home"><span>홈</span></button>
        <button class="nav-item" type="button" data-nav="compare"><span>비교함</span></button>
        <button class="nav-item" type="button" data-nav="favorite"><span>즐겨찾기</span></button>
        <button class="nav-item" type="button" data-nav="recent"><span>최근 조회</span></button>
        <button class="nav-item" type="button" data-nav="settings"><span>보기 모드</span></button>
      </nav>
    </aside>

    <main class="main-panel glass-card" id="mainPanel">
      <div class="panel-head">
        <button class="icon-button" id="backButton" type="button" aria-label="홈으로">‹</button>
        <h1 id="detailTitle">Apple Watch Series 11</h1>
        <div class="head-actions">
          <button class="icon-button" id="favoriteButton" type="button" aria-label="즐겨찾기">♡</button>
          <button class="icon-button" id="shareButton" type="button" aria-label="공유">↗</button>
        </div>
      </div>

      <section class="hero-card">
        <div class="product-visual-wrap">
          <img id="heroImage" class="hero-product-image" src="assets/products/watch-series11.png" alt="Apple Watch Series 11 대표 이미지" />
          <span class="source-label">운영자료 대표 이미지</span>
        </div>
        <div class="hero-copy">
          <p class="eyebrow">Apple Watch</p>
          <h2 id="heroName">Series 11</h2>
          <p id="heroTagline" class="muted">더 똑똑해진 건강 파트너.</p>
          <div class="price-row">
            <strong id="heroPrice">599,000원부터</strong>
            <span id="heroCare" class="care-pill">AppleCare+ 119,000원</span>
          </div>
        </div>
      </section>

      <section class="feature-strip" id="featureStrip"></section>

      <section class="detail-tabs glass-card inner-card">
        <div class="tab-row" role="tablist" aria-label="제품 상세 메뉴">
          <button class="tab active" type="button" data-main-tab="model">모델 선택</button>
          <button class="tab" type="button" data-main-tab="features">제품 특징</button>
          <button class="tab" type="button" data-main-tab="specs">기술 사양</button>
          <button class="tab" type="button" data-main-tab="accessories">호환 액세서리</button>
        </div>
        <div id="mainTabContent"></div>
      </section>
    </main>

    <section class="compare-panel glass-card" id="comparePanel">
      <div class="panel-head compare-head">
        <h2>비교하기</h2>
        <button class="ghost-button" id="swapCompareButton" type="button">좌우 바꾸기</button>
      </div>
      <div class="compare-top">
        <div class="compare-product" id="compareLeftCard"></div>
        <div class="vs">VS</div>
        <div class="compare-product" id="compareRightCard"></div>
      </div>
      <div class="compare-tabs" role="tablist" aria-label="비교 메뉴">
        <button class="compare-tab active" type="button" data-compare-tab="differences">핵심 차이</button>
        <button class="compare-tab" type="button" data-compare-tab="specs">전체 스펙</button>
        <button class="compare-tab" type="button" data-compare-tab="consult">상담 요약</button>
      </div>
      <div id="compareContent"></div>
    </section>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <div id="modal" class="modal-backdrop" hidden>
    <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head"><h2 id="modalTitle">최근 조회</h2><button id="modalClose" class="icon-button" type="button" aria-label="닫기">×</button></div>
      <div id="modalBody"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
