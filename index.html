<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#f5f5f7" />
  <title>Apple 통합 상담북</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="apple-mark">●</div>
        <div><strong>Apple 상담북</strong><small>2026년 7월 운영 라인업</small></div>
      </div>
      <div class="top-actions">
        <button id="viewModeBtn" class="soft-btn" type="button">내부 직원용</button>
        <button id="favoritesBtn" class="icon-btn" type="button" aria-label="즐겨찾기">♡</button>
        <button id="recentBtn" class="icon-btn" type="button" aria-label="최근 조회">↺</button>
      </div>
    </header>

    <section class="search-area">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.4-4.4m2.4-5.1a7.5 7.5 0 1 1-15 0 7.5 7.5 0 0 1 15 0Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <input id="searchInput" autocomplete="off" placeholder="제품명, 모델코드, 색상, 용량, 호환 모델 검색" />
        <button id="clearSearchBtn" class="clear-btn" type="button" aria-label="검색 지우기">×</button>
      </div>
      <div id="searchResults" class="search-results" hidden></div>
      <div class="quick-row">
        <span>빠른 검색</span>
        <button data-query="SE3">SE3</button><button data-query="MFHP4KH/A">AirPods Pro 3 코드</button>
        <button data-query="256GB">256GB</button><button data-query="iPad Air 11">iPad Air 11</button>
      </div>
    </section>

    <nav id="categoryNav" class="category-nav" aria-label="제품 카테고리"></nav>

    <main class="workspace">
      <section class="catalog-panel">
        <div class="section-title-row">
          <div><h1 id="catalogTitle">iPhone</h1><p id="catalogMeta"></p></div>
          <div class="catalog-actions">
            <button id="showAllBtn" class="all-products-btn" type="button" aria-pressed="false">
              <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
              전체 제품 보기
            </button>
            <select id="sortSelect" aria-label="정렬">
            <option value="name">이름순</option>
            <option value="price-asc">가격 낮은순</option>
            <option value="price-desc">가격 높은순</option>
            <option value="variants">옵션 많은순</option>
            </select>
          </div>
        </div>
        <div id="recommendedComparisons" class="recommended"></div>
        <div id="productGrid" class="product-grid"></div>
        <div id="emptyState" class="empty-state" hidden><strong>검색 결과가 없습니다.</strong><p>모델코드 일부나 제품군 이름으로 다시 검색해보세요.</p></div>
      </section>

      <aside id="detailPanel" class="detail-panel">
        <div id="detailEmpty" class="detail-empty">
          <div class="empty-device">⌁</div><h2>제품을 선택하세요</h2><p>옵션, 가격, 모델코드와 상담 포인트를 확인할 수 있습니다.</p>
        </div>
        <div id="detailContent" hidden>
          <div class="detail-toolbar">
            <button id="closeDetailBtn" class="back-btn" type="button">‹ 목록</button>
            <div><button id="detailFavoriteBtn" class="icon-btn" type="button">♡</button><button id="shareBtn" class="icon-btn" type="button">↗</button></div>
          </div>
          <div class="detail-hero">
            <div class="detail-image-wrap"><img id="detailImage" alt="" /><div id="detailFallback" class="fallback-art"></div></div>
            <div class="detail-heading"><p id="detailCategory"></p><h2 id="detailFamily"></h2><p id="detailDescription"></p><strong id="detailStartPrice"></strong></div>
          </div>
          <div class="detail-links"><a id="officialLink" target="_blank" rel="noopener">Apple 공식 비교 페이지 ↗</a><span id="variantCountBadge"></span></div>
          <section id="appleCareBox" class="care-box" hidden></section>
          <section class="option-section"><h3>옵션 선택</h3><div id="filterControls"></div></section>
          <section class="selected-card">
            <div class="selected-head"><div><span>선택 모델</span><strong id="selectedPrice"></strong></div><button id="copyCodeBtn" class="primary-btn" type="button">모델코드 복사</button></div>
            <div id="selectedCodeRow" class="code-row"></div>
            <dl id="variantSpecs" class="spec-list"></dl>
          </section>
          <section id="officialSpecsSection" class="official-spec-section" hidden>
            <div class="official-spec-header">
              <div>
                <span class="official-badge">Apple 공식 사양</span>
                <h3>제품 상세 스펙</h3>
                <p id="officialSpecSummary"></p>
              </div>
              <a id="officialSpecSource" target="_blank" rel="noopener">공식 사양 원문 ↗</a>
            </div>
            <div id="officialSpecHighlights" class="official-highlights"></div>
            <div id="officialSpecGroups" class="official-groups"></div>
            <p id="officialSpecBasis" class="official-basis"></p>
          </section>
          <section class="sales-section"><h3>상담 포인트</h3><div id="salesPoints" class="sales-points"></div></section>
          <div class="detail-bottom-actions"><button id="addCompareBtn" class="primary-btn wide" type="button">비교함에 추가</button></div>
        </div>
      </aside>
    </main>
  </div>

  <div id="compareTray" class="compare-tray" hidden>
    <div><strong>비교함 <span id="compareCount">0</span></strong><div id="compareTrayItems"></div></div>
    <button id="openCompareBtn" class="primary-btn" type="button">비교하기</button>
  </div>

  <div id="modalBackdrop" class="modal-backdrop" hidden>
    <section id="compareModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="compareModalTitle">
      <header><div><small>제품 비교</small><h2 id="compareModalTitle">핵심 차이 한눈에 보기</h2></div><button id="closeModalBtn" class="icon-btn" type="button">×</button></header>
      <div id="compareContent"></div>
    </section>
  </div>

  <div id="sideSheetBackdrop" class="sheet-backdrop" hidden>
    <aside class="side-sheet"><header><h2 id="sheetTitle">목록</h2><button id="closeSheetBtn" class="icon-btn" type="button">×</button></header><div id="sheetContent"></div></aside>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="data.js"></script>
  <script src="official-specs.js"></script>
  <script src="app.js"></script>
</body>
</html>
